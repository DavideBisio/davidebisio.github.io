# ==========================================
# Site Settings - davidebisio.github.io
# ==========================================

title: Davide Bisio
author: Davide Bisio
description: >- # This is used for SEO meta descriptions
  Personal website and blog of Davide Bisio. 
  Focusing on articles, projects, and professional insights.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://davidebisio.github.io" # the base hostname & protocol for your site

# ==========================================
# Theme & Layout
# ==========================================

remote_theme: pages-themes/modernist@v0.2.0

collections:
  articles:
    output: true
    permalink: /articles/:path/

# Modular Design Settings
defaults:
  - scope:
      path: "" # all files in the project
    values:
      layout: "default"
  - scope:
      path: "_posts" # all files in the blog folder
      type: "posts"
    values:
      layout: "post"
      author: "Davide Bisio"
  - scope:
      path: "_articles"
      type: "articles"
    values:
      layout: "post"

# ==========================================
# Navigation (Modular for the Theme)
# ==========================================

header_pages:
  - index.md
  - articles.md
  - blog.md

# ==========================================
# GitHub Metadata mock (for local development)
# On GitHub Pages these are injected automatically; locally they are not.
# Remove or keep this block — it is safely ignored when deployed.
# ==========================================

github:
  repository_url: https://github.com/davidebisio/davidebisio.github.io
  repository_name: davidebisio.github.io
  owner_url: https://github.com/davidebisio
  owner_name: davidebisio
  project_title: Davide Bisio
  project_tagline: >-
    Personal website and blog of Davide Bisio.
    Focusing on articles, projects, and professional insights.
  zip_url: https://github.com/davidebisio/davidebisio.github.io/archive/refs/heads/main.zip
  tar_url: https://github.com/davidebisio/davidebisio.github.io/archive/refs/heads/main.tar.gz

# ==========================================
# SEO & Indexing Features
# ==========================================

# Plugins to handle sitemap, robots, and Google-friendly metadata
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-gist
  - jekyll-remote-theme

# SEO Tag Configuration
twitter:
  username: davidebisio
  card: summary
logo: /assets/img/logo.png # Path to your avatar/logo for search results

# ==========================================
# Build Settings
# ==========================================

markdown: kramdown
highlighter: rouge
lsi: false

# Suppress upstream Sass @import deprecation warnings from the Modernist theme.
# Remove once the theme is updated to use @use/@forward.
sass:
  quiet_deps: true

# Exclude these files from the production build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .jekyll-cache
  - .jekyll-metadata
