---
layout: default
---

<article class="post">
  <header class="post-header">
    {% if page.date %}
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
      {% if page.author %} &mdash; {{ page.author }}{% endif %}
    </p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
